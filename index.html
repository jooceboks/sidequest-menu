<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the side quest menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0E1116;
    --ink-soft: #171b22;
    --parchment: #EDE6D6;
    --parchment-dim: #d9d1bd;
    --brass: #B99B5C;
    --sage: #8FA396;
    --line: rgba(237, 230, 214, 0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--parchment);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh; /* accounts for mobile browser address bar, keeps content truly centered */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    width: 100%;
    max-width: 480px;
  }

  /* ---------- Intro ---------- */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeUp 0.5s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 14px;
  }

  h1.title {
    font-family: 'Instrument Serif', serif;
    font-size: 52px;
    line-height: 1.05;
    font-weight: 400;
    margin-bottom: 18px;
    color: var(--parchment);
  }

  h1.title em { color: var(--brass); font-style: italic; }

  .sub {
    font-size: 13.5px;
    line-height: 1.6;
    color: rgba(237,230,214,0.65);
    margin-bottom: 36px;
    max-width: 38ch;
  }

  button.primary {
    background: var(--brass);
    color: var(--ink);
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 15px 28px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
    text-transform: uppercase;
  }
  button.primary:hover { background: #cbad70; transform: translateY(-1px); }
  button.primary:active { transform: translateY(0); }

  /* ---------- Quiz ---------- */
  .progress-row {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }
  .progress-seg {
    height: 2px;
    flex: 1;
    background: var(--line);
    position: relative;
    overflow: hidden;
  }
  .progress-seg.done { background: var(--brass); }

  .q-eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--sage);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .q-context {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(237,230,214,0.4);
    margin-bottom: 4px;
  }

  h2.question {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 28px;
  }

  .q-block {
    animation: pageTurn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes pageTurn {
    from { opacity: 0; transform: translateX(14px) rotateY(-4deg); }
    to { opacity: 1; transform: translateX(0) rotateY(0); }
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--parchment);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    text-align: left;
    padding: 16px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .option:hover { border-color: var(--brass); background: rgba(185,155,92,0.06); }
  .option .arrow { color: var(--brass); opacity: 0; transition: opacity 0.15s ease; }
  .option:hover .arrow { opacity: 1; }

  /* ---------- Menu Card ---------- */
  .menu-card {
    background: var(--parchment);
    color: var(--ink);
    padding: 44px 34px 36px;
    position: relative;
    box-shadow: 0 30px 60px rgba(0,0,0,0.45);
  }

  .menu-card::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(14,17,22,0.15);
    pointer-events: none;
  }

  .menu-head {
    text-align: center;
    margin-bottom: 30px;
  }

  .menu-eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 8px;
  }

  .menu-title {
    font-family: 'Instrument Serif', serif;
    font-size: 34px;
    font-style: italic;
    color: var(--ink);
  }

  .menu-date {
    font-size: 10.5px;
    letter-spacing: 0.08em;
    color: rgba(14,17,22,0.5);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .course {
    margin-bottom: 26px;
  }

  .course-label {
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .course-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(14,17,22,0.12);
  }

  .item-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
  }

  .item-name {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: var(--ink);
    line-height: 1.25;
  }

  .leader {
    flex: 1 1 auto;
    min-width: 16px;
    border-bottom: 1.5px dotted rgba(14,17,22,0.3);
    transform: translateY(-4px);
  }

  .item-time {
    font-size: 12px;
    color: var(--brass);
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .item-desc {
    font-size: 11.5px;
    color: rgba(14,17,22,0.6);
    line-height: 1.5;
    margin-top: 2px;
    max-width: 34ch;
  }

  .reroll-btn {
    background: none;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(14,17,22,0.35);
    cursor: pointer;
    padding: 2px 0;
    margin-top: 4px;
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.15s ease;
  }
  .reroll-btn:hover { color: var(--brass); }

  /* hide reroll buttons in the exported PNG */
  .exporting .reroll-btn { display: none; }

  .menu-foot {
    margin-top: 32px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(14,17,22,0.45);
  }

  .card-wrap {
    padding: 4px;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }

  button.secondary {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--parchment);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 13px 18px;
    cursor: pointer;
    flex: 1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: border-color 0.15s ease;
  }
  button.secondary:hover { border-color: var(--brass); }

  .brand-tag {
    text-align: center;
    margin-top: 26px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: rgba(237,230,214,0.4);
  }
  .brand-tag span { color: var(--brass); }

  @media (max-width: 480px) {
    body { padding: 20px clamp(20px, 6vw, 32px); }

    h1.title { font-size: 38px; }
    h2.question { font-size: 25px; }

    .menu-card { padding: 34px 24px 28px; }
    .menu-title { font-size: 28px; }
    .menu-eyebrow { font-size: 9.5px; }
    .menu-date { font-size: 10px; }

    .course-label { font-size: 9.5px; margin-bottom: 8px; }
    .item-name { font-size: 16px; }
    .item-time { font-size: 11px; }
    .item-desc { font-size: 11px; }
    .course { margin-bottom: 22px; }

    .menu-foot { font-size: 9px; margin-top: 26px; }
    .brand-tag { font-size: 10px; margin-top: 20px; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- INTRO -->
  <div class="screen active" id="screen-intro">
    <div class="eyebrow">sliu.log presents</div>
    <h1 class="title">a little bit<br>of <em>this</em>, a little<br>bit of <em>that.</em></h1>
    <p class="sub">answer five questions. get a personalized menu for your week — appetizer to dessert, no productivity required.</p>
    <button class="primary" onclick="startQuiz()">order your menu →</button>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="progress-row" id="progress-row"></div>
    <div class="q-block" id="q-block">
      <div class="q-context" id="q-context"></div>
      <div class="q-eyebrow" id="q-eyebrow">question 1 of 5</div>
      <h2 class="question" id="q-text"></h2>
      <div class="options" id="q-options"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="card-wrap">
      <div class="menu-card" id="menu-card">
        <div class="menu-head">
          <div class="menu-eyebrow">the side quest menu</div>
          <div class="menu-title" id="menu-title">today's quests</div>
          <div class="menu-date" id="menu-date"></div>
        </div>
        <div id="courses"></div>
        <div class="menu-foot">a little bit of this and that</div>
      </div>
    </div>
    <div class="actions">
      <button class="secondary" onclick="downloadCard()">save / share</button>
      <button class="secondary" onclick="restart()">order again</button>
    </div>
    <div class="brand-tag">made by <span>@sliu.log</span></div>
  </div>

</div>

  let answers = {};
  let currentQ = 0;

  function startQuiz() {
    answers = {};
    currentQ = 0;
    show('screen-quiz');
    renderProgress();
    renderQuestion();
  }

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function renderProgress() {
    const row = document.getElementById('progress-row');
    row.innerHTML = '';
    questions.forEach((_, i) => {
      const seg = document.createElement('div');
      seg.className = 'progress-seg' + (i < currentQ ? ' done' : '');
      row.appendChild(seg);
    });
  }

  function renderQuestion() {
    const q = questions[currentQ];
    const block = document.getElementById('q-block');
    // restart the animation on every question
    block.style.animation = 'none';
    void block.offsetWidth; // force reflow
    block.style.animation = '';

    document.getElementById('q-context').textContent = q.context;
    document.getElementById('q-eyebrow').textContent = `question ${currentQ + 1} of ${questions.length}`;
    document.getElementById('q-text').textContent = q.text;
    const opts = document.getElementById('q-options');
    opts.innerHTML = '';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.innerHTML = `<span>${opt.label}</span><span class="arrow">→</span>`;
      btn.onclick = () => selectAnswer(q.key, opt.value);
      opts.appendChild(btn);
    });
  }

  function selectAnswer(key, value) {
    answers[key] = value;
    currentQ++;
    if (currentQ < questions.length) {
      renderProgress();
      renderQuestion();
    } else {
      generateMenu();
    }
  }

  function scoreItem(item) {
    let score = 0;
    for (const key in answers) {
      const tagVal = item.tags[key];
      if (!tagVal) continue;
      const userVal = answers[key];
      if (Array.isArray(tagVal)) {
        if (tagVal.includes(userVal)) score += 1;
      } else if (tagVal === userVal || tagVal === "either") {
        score += 1;
      }
    }
    return score;
  }

  function pickBest(list, usedNames) {
    const scored = list
      .filter(i => !usedNames.has(i.name))
      .map(i => ({ item: i, score: scoreItem(i) + Math.random() * 0.5 }))
      .sort((a, b) => b.score - a.score);
    return scored[0].item;
  }

  const courseLabels = {
    appetizer: 'appetizer',
    main: 'main course',
    dessert: 'dessert',
    special: "weekend special"
  };

  let usedByCourse = { appetizer: new Set(), main: new Set(), dessert: new Set(), special: new Set() };
  let chosen = {};

  function generateMenu() {
    usedByCourse = { appetizer: new Set(), main: new Set(), dessert: new Set(), special: new Set() };
    chosen = {};
    ['appetizer', 'main', 'dessert', 'special'].forEach(course => {
      const item = pickBest(bank[course], usedByCourse[course]);
      usedByCourse[course].add(item.name);
      chosen[course] = item;
    });

    const now = new Date();
    document.getElementById('menu-date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    renderCourses();
    show('screen-result');
  }

  function renderCourses() {
    const coursesEl = document.getElementById('courses');
    coursesEl.innerHTML = '';
    Object.keys(courseLabels).forEach(key => {
      const item = chosen[key];
      const div = document.createElement('div');
      div.className = 'course';
      div.innerHTML = `
        <div class="course-label">${courseLabels[key]}</div>
        <div class="item-row">
          <span class="item-name">${item.name}</span>
          <span class="leader"></span>
          <span class="item-time">${item.time}</span>
        </div>
        <div class="item-desc">${item.desc}</div>
        <button class="reroll-btn" data-course="${key}">reroll</button>
      `;
      coursesEl.appendChild(div);
    });
  }

  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('reroll-btn')) {
      rerollCourse(e.target.getAttribute('data-course'));
    }
  });

  function rerollCourse(courseKey) {
    const list = bank[courseKey];
    const currentItem = chosen[courseKey];
    const used = usedByCourse[courseKey];

    // pool = anything in this course's bank not already shown this session
    let pool = list.filter(i => !used.has(i.name));

    // once we've cycled through the whole bank for this course, start over
    // (but never immediately repeat the item currently on screen)
    if (pool.length === 0) {
      used.clear();
      pool = list.filter(i => i.name !== currentItem.name);
    }

    if (pool.length === 0) return; // only one item ever existed for this course

    // true random pick — reroll means "something different," not "next best match"
    const newItem = pool[Math.floor(Math.random() * pool.length)];

    used.add(newItem.name);
    chosen[courseKey] = newItem;
    renderCourses();
  }

  function restart() {
    show('screen-intro');
  }

  async function downloadCard() {
    const card = document.getElementById('menu-card');
    card.classList.add('exporting');

    // make sure webfonts are actually loaded before we draw text on canvas,
    // otherwise the CTA text below can render in a fallback system font
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }

    const cardCanvas = await html2canvas(card, { scale: 3, backgroundColor: '#EDE6D6' });
    card.classList.remove('exporting');

    // compose the captured card into a proper 9:16 story-ready frame
    // instead of exporting the card at its raw on-screen size
    const W = 1080, H = 1920;
    const out = document.createElement('canvas');
    out.width = W;
    out.height = H;
    const ctx = out.getContext('2d');

    // background matches the site, so the card reads as "framed" not stretched
    ctx.fillStyle = '#0E1116';
    ctx.fillRect(0, 0, W, H);

    // reserve space top and bottom for branding, fit the card into what's left
    const marginX = 90;
    const topSpace = 230;
    const bottomSpace = 220;
    const maxW = W - marginX * 2;
    const maxH = H - topSpace - bottomSpace;

    const scale = Math.min(maxW / cardCanvas.width, maxH / cardCanvas.height);
    const drawW = cardCanvas.width * scale;
    const drawH = cardCanvas.height * scale;
    const drawX = (W - drawW) / 2;
    const drawY = topSpace + (maxH - drawH) / 2;

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 60;
    ctx.shadowOffsetY = 30;
    ctx.drawImage(cardCanvas, drawX, drawY, drawW, drawH);
    ctx.restore();

    // top label
    ctx.textAlign = 'center';
    ctx.fillStyle = '#B99B5C';
    ctx.font = '500 26px "IBM Plex Mono"';
    ctx.fillText('the side quest menu', W / 2, 130);

    // bottom CTA — this is what makes a screenshot/repost actually
    // shareable instead of a dead-end image
    ctx.fillStyle = 'rgba(237,230,214,0.75)';
    ctx.font = '30px "IBM Plex Mono"';
    ctx.fillText('make yours — link in bio', W / 2, H - 130);

    ctx.fillStyle = '#B99B5C';
    ctx.font = 'italic 38px "Instrument Serif"';
    ctx.fillText('@sliu.log', W / 2, H - 75);

    out.toBlob(async (blob) => {
      const file = new File([blob], 'my-side-quest-menu.png', { type: 'image/png' });

      // Prefer the native share sheet on phones — this is what lets iOS
      // users tap "Save Image" straight to their Photos app. The download
      // attribute below silently fails to save on iOS Safari, so this path
      // is not just a fallback, it's the better experience on mobile.
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: 'my side quest menu',
          });
          return;
        } catch (err) {
          // user cancelled the share sheet — do nothing further
          if (err.name === 'AbortError') return;
          // otherwise fall through to the manual fallback below
        }
      }

      // Fallback for desktop browsers and any phone browser without
      // Web Share support: try a normal download link first.
      const url = URL.createObjectURL(blob);
      const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);

      if (isIOS) {
        // iOS Safari ignores the download attribute — open the image in a
        // new tab instead so the user can press-and-hold to save it.
        const win = window.open(url, '_blank');
        if (!win) {
          alert('please allow pop-ups, or press and hold the menu card image to save it');
        }
      } else {
        const link = document.createElement('a');
        link.download = 'my-side-quest-menu.png';
        link.href = url;
        link.click();
      }

      setTimeout(() => URL.revokeObjectURL(url), 10000);
    }, 'image/png');
  }
</script>
